# yaml file for generating code for new instructions

#######################################################

- name: Conv
  attributes:
    - name: kernel_shape
      type: int64[]
      required: true

    - name: group
      type: int64
      default: 1

    - name: dilations
      type: int64[]
      default: [1, 1]

    - name: pads
      type: int64[]
      default: [0, 0]

    - name: strides
      type: int64[]
      default: [1, 1]

#######################################################

- name: Gemm
  attributes:
    - name: alpha
      type: float32
      default: 1.0


    - name: beta
      type: float32
      default: 1.0

    - name: transA
      type: int64
      default: 0

    - name: transB
      type: int64
      default: 0


#######################################################

- name: Add
  attributes:


#######################################################

- name: Relu
  attributes:


#######################################################

- name: Mul
  attributes:


#######################################################

- name: MatMul
  attributes:


#######################################################

- name: MaxPool
  attributes:
    - name: kernel_shape
      type: int64[]
      required: true

    - name: auto_pad
      type: string
      default: '"NOTSET"'

    - name: ceil_mode
      type: int64
      default: 0

    - name: dilations
      type: int64[]
      default: [1, 1]

    - name: pads
      type: int64[]
      default: [0, 0]

    - name: storage_order
      type: int64
      default: 0

    - name: strides
      type: int64[]
      default: [1, 1]

#######################################################
